name: Go

on:
  pull_request:
  push:
    branches:
      - master
      - develop

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on

    steps:
    - name: Set up Go 1.25
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
      id: go

    - uses: actions/checkout@v4

    - uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Run tests
      run: |
        make bootstrap
        make test

  e2e:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on

    steps:
    - name: Set up Go 1.25
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
      id: go
    - uses: actions/setup-node@v4
      with:
        node-version: '16'
    - uses: dart-lang/setup-dart@v1
      with:
        sdk: "2.14.4"
    - uses: nanasess/setup-chromedriver@v2.2.2
    - uses: actions/checkout@v4

    - uses: actions/cache@v4
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-

    - name: Run E2E tests
      run: |
        make e2e       

    - name: Ensure samples are generated
      env:
        TZ: Asia/Tokyo
      run: |
        make gen_samples

        # Exclude "generated version:" / "api_gen version:" comment lines from the diff check.
        # These lines embed the binary version at build time and are expected to differ
        # between a tagged release build and a local/CI build of an untagged commit.
        real_diff=$(git diff | grep "^[+-]" | grep -v "^---\|^+++" | grep -v "generated version:\|api_gen version:" || true)
        if [ -n "$real_diff" ]; then
          git diff
          echo 'Please run "make gen_samples"'
          exit 1
        fi
