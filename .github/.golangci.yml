version: "2"
run:
  go: "1.24"
linters:
  default: none
  enable:
    - bodyclose
    - dogsled
    - dupl
    - errcheck
    - goconst
    - govet
    - ineffassign
    - misspell
    - revive
    - unconvert
    - unused
    - whitespace
  settings:
    dupl:
      threshold: 100
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - fmt.*
        - io/ioutil.Read.*
        - io.Close
        - os.Close
        - io/fs.Close
    goconst:
      min-len: 2
      min-occurrences: 2
    govet:
      enable:
        - shadow
    misspell:
      locale: US
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
        path: cmd/api_gen/client/.*\.go
      - linters:
          - dupl
          - mnd
        path: _test\.go
      - linters:
          - lll
        source: '//go:generate '
      - path: (.+)\.go$
        text: declaration of "(err|ctx)" shadows declaration at
    paths:
      - test/testdata_etc
      - internal/cache
      - internal/renameio
      - internal/robustio
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/golangci/golangci-lint
  exclusions:
    generated: lax
    paths:
      - test/testdata_etc
      - internal/cache
      - internal/renameio
      - internal/robustio
      - third_party$
      - builtin$
      - examples$
