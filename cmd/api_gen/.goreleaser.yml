version: 2

project_name: api_gen

env:
  - GO111MODULE=on

builds:
  - main: .
    binary: api_gen
    ldflags:
      - -s -w
      - -X github.com/go-generalize/api_gen/v2/common.AppVersion=v{{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: >-
      {{- .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- with .Arm }}v{{ . }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

release:
  prerelease: auto
