name: linter
on: [pull_request]
jobs:
  golangci-lint:
    name: runner / golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code into the Go module directory
        uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install dependencies
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          make bootstrap
      - name: Ensure samples are generated
        env:
          TZ: Asia/Tokyo
        run: |
          make gen_samples

          # Exclude "generated version:" / "api_gen version:" comment lines from the diff check.
          # These lines embed the binary version at build time and are expected to differ
          # between a tagged release build and a local/CI build of an untagged commit.
          real_diff=$(git diff | grep "^[+-]" | grep -v "^---\|^+++" | grep -v "generated version:\|api_gen version:" || true)
          if [ -n "$real_diff" ]; then
            git diff
            echo 'Please run "make gen_samples"'
            exit 1
          fi
      - name: golangci-lint
        # TODO: golangci-lint v1.x is built with Go 1.24 and cannot type-check go1.25 modules.
        # Upgrade to v2.x (which requires config schema migration) in a follow-up PR.
        continue-on-error: true
        uses: golangci/golangci-lint-action@v6
        with:
          args: "--config=.github/.golangci.yml"
          version: v1.64.8
          skip-cache: true
